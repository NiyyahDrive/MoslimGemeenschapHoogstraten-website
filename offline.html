<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Tijdelijk Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #f3f4f6;
            color: #1f2937;
            font-family: Arial, sans-serif;
        }
        main {
            width: 100%;
            max-width: 720px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin: 0 0 16px;
            color: #b91c1c;
            font-size: 2rem;
        }
        p {
            margin: 0 0 12px;
            line-height: 1.5;
        }
        hr {
            margin: 24px 0;
            border: 0;
            border-top: 1px solid #e5e7eb;
        }
        .small {
            margin-bottom: 0;
            color: #6b7280;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Website tijdelijk offline</h1>
        <p>Deze website is momenteel niet beschikbaar.</p>
        <p>Probeer het later opnieuw. Bedankt voor je begrip.</p>
        <hr>
        <p class="small">This website is temporarily offline. Please check back later.</p>
    </main>
</body>
</html>
